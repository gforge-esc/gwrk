name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Configure Git for tests
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # Known CI-hostile tests excluded:
      # - notify.test.ts: Starts real Fastify servers, 23s locally → unpredictable on CI
      # - pulse-integration.test.ts: Creates real git repos with 100 commits (~12s)
      # These are enforced locally by the pre-commit hook (build + test on develop/main).
      - name: Test
        run: >-
          pnpm vitest run
          --exclude '**/e2e/**'
          --exclude '**/notify.test.ts'
          --exclude '**/pulse-integration.test.ts'
        env:
          CI: "true"

      - name: Lint (advisory)
        run: pnpm lint
        continue-on-error: true

name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        # Both values must stay in sync with the required status-check contexts
        # in scripts/setup-github-public.sh (`ci (20)` and `ci (22)`). Dropping a
        # value here without updating the rulesets leaves a required check that
        # never reports and blocks every PR. Node 20 matches CONTRIBUTING's
        # "Node 20 and 22" promise; engines.node is >= 18.
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Configure Git for tests
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # Runs the hermetic suite. Non-hermetic daemon/dispatch integration tests
      # and slow CLI-spawn suites are quarantined via GWRK_SKIP_INTEGRATION
      # (single source of truth: QUARANTINED_INTEGRATION in vitest.config.ts).
      # They still run locally via `pnpm test` (pre-commit hook on develop/main).
      # TODO(gwrk): isolate them (temp dirs, random ports, in-process help) and
      # remove the quarantine.
      - name: Test
        run: pnpm test:ci
        env:
          CI: "true"

      - name: Lint (advisory)
        run: pnpm lint
        continue-on-error: true

name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Integration tests create real git repos and commit to them. A CI runner
      # has no git identity or default-branch name, so configure both globally.
      - name: Configure git
        run: |
          git config --global user.email "ci@gwrk.dev"
          git config --global user.name "gwrk CI"
          git config --global init.defaultBranch main

      - name: Build
        run: pnpm build

      # Runs the hermetic suite; non-hermetic daemon/dispatch integration tests
      # are quarantined via GWRK_SKIP_INTEGRATION (see vitest.config.ts).
      - name: Test
        run: pnpm test:ci

      - name: Lint (advisory)
        run: pnpm lint
        continue-on-error: true

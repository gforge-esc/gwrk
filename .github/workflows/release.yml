name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Package tarball
        run: |
          # npm pack respects the "files" array in package.json
          npm pack
          # Rename to a predictable name without the @scope prefix
          mv gwrk-cli-*.tgz gwrk-${{ github.ref_name }}.tgz

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "gwrk ${{ github.ref_name }}" \
            --generate-notes \
            gwrk-${{ github.ref_name }}.tgz

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: gwrk-api:dev
    container_name: gwrk-api
    ports:
      - "18790:18790"
    volumes:
      - .:/workspace
      - ~/.gwrk:/root/.gwrk
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=development
      - GWRK_PROJECT_ROOT=/workspace
    restart: unless-stopped

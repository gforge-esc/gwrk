type: workflow
name: gwrk-build-plan
version: 0.1.0
description: Update the master build plan when adding, modifying, or reordering features.
outputSchema:
  type: object
  properties:
    summary:
      type: string
    intents:
      type: array
      items:
        type: object
        properties:
          action:
            type: string
            enum: [WRITE_FILE, CREATE_DIR, RUN_COMMAND]
          filePath:
            type: string
          content:
            type: string
          dirPath:
            type: string
          command:
            type: string
        required: [action]
  required: [summary, intents]

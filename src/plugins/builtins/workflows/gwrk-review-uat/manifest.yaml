type: workflow
name: gwrk-review-uat
version: 0.1.0
description: User acceptance testing of implementation against spec.
outputSchema:
  type: object
  properties:
    summary:
      type: string
    verdict:
      type: string
      enum: [GO, NO-GO]
    reopenedTasks:
      type: array
      items:
        type: string
    intents:
      type: array
      items:
        type: object
        properties:
          action:
            type: string
            enum: [WRITE_FILE, CREATE_DIR, RUN_COMMAND]
          filePath:
            type: string
          content:
            type: string
          dirPath:
            type: string
          command:
            type: string
        required: [action]
  required: [summary, verdict, reopenedTasks, intents]

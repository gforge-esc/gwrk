_metadata:
  major_version: 2
  minor_version: 1
display_information:
  name: gwrk
  description: "Principal Engineer's Operating System — shipping pipeline, pulse, and dispatch."
  background_color: "#FF1493"
features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: false
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: gwrk
    always_online: true
  slash_commands:
    - command: /gwrk
      description: "Show gwrk status or run a subcommand"
      usage_hint: "[status|dispatch|approve|reject|pause|pulse|effort|logs] [args]"
      should_escape: false
oauth_config:
  scopes:
    bot:
      - chat:write
      - channels:read
      - commands
      - app_mentions:read
      - users:read
      - reactions:read
settings:
  socket_mode_enabled: true
  org_deploy_enabled: false
  interactivity:
    is_enabled: true
  event_subscriptions:
    bot_events:
      - app_home_opened
      - app_mention

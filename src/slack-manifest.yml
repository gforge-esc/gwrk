display_information:
  name: gwrk
  description: "\U0001F9A9 You better gwrk!"
  background_color: "#d94579"
  long_description: gwrk is a CLI and local build server that orchestrates fleets of AI coding agents through governed, parallelized pipelines — and lets you control the whole thing from Slack. It takes your architectural vision, decomposes it into executable phases, dispatches agents to build them in parallel, drives results through review gates and CI, and reports back here. You ship features while walking the dog. gwrk is not another AI code generator. It's the general contractor for your software factory.
features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: false
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: gwrk
    always_online: true
  slash_commands:
    - command: /gwrk
      description: Show gwrk status or run a subcommand
      usage_hint: "[status|dispatch|approve|reject|pause|pulse|effort|logs|ship|define] [args]"
      should_escape: false
oauth_config:
  scopes:
    bot:
      - channels:join
      - app_mentions:read
      - channels:manage
      - channels:read
      - chat:write
      - commands
      - reactions:read
      - users:read
      - incoming-webhook
  pkce_enabled: false
settings:
  event_subscriptions:
    bot_events:
      - app_home_opened
      - app_mention
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
  is_mcp_enabled: false
